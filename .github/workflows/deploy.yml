name: Deploy Quiz

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into HTML
        env:
          SHEET_ID:    ${{ secrets.SHEET_ID }}
          NVIDIA_KEY:  ${{ secrets.NVIDIA_KEY }}
          SCRIPT_URL:  ${{ secrets.SCRIPT_URL }}
        run: |
          sed -i \
            -e "s|__SHEET_ID__|${SHEET_ID}|g" \
            -e "s|__NVIDIA_KEY__|${NVIDIA_KEY}|g" \
            -e "s|__SCRIPT_URL__|${SCRIPT_URL}|g" \
            index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
